<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>GameFinder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🎮 GameFinder</h1>
    <p>Descubra seus jogos favoritos</p>
  </header>

  <main>
    <section class="search">
      <input type="text" placeholder="Digite o nome do jogo" id="texto">

      <button id="buscar">Buscar</button>
    </section>

    <section class="filters">
      <div class="filter-group">
        <label for="rating">Nota mínima</label>
        <select id="rating">
          <option value="">Todas</option>
          <option value="4">4+</option>
          <option value="3">3+</option>
          <option value="2">2+</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="year">Ano</label>
        <select id="year">
          <option value="">Todos</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2020">2020+</option>
          <option value="2015">2015+</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="order">Ordenar por</label>
        <select id="order">
          <option value="relevance">Relevância</option>
          <option value="rating">Nota</option>
          <option value="released">Lançamento</option>
        </select>
      </div>
    </section>

    </section>
    <section class="results" id="results">



    </section>
  </main>
  <div id="gameModal" class="modal">

<div class="modal-content">

<span id="fecharModal" class="close">&times;</span>

<img id="modalImagem" src="" alt="Imagem do jogo">

<h2 id="modalTitulo"></h2>

<p id="modalDescricao"></p>

<div class="modal-info">

<p><strong>⭐ Rating:</strong> <span id="modalRating"></span></p>

<p><strong>📅 Lançamento:</strong> <span id="modalAno"></span></p>

<p><strong>🎮 Plataformas:</strong> <span id="modalPlataformas"></span></p>

<p><strong>🏷️ Gêneros:</strong> <span id="modalGeneros"></span></p>

</div>

</div>

</div>
</body>
  <script src="main.js"></script>

</html>
