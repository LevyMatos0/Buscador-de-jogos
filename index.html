<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>GameFinder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🎮 GameFinder</h1>
    <p>Descubra seus jogos favoritos</p>
  </header>

  <main>
    <section class="search">
      <input type="text" placeholder="Digite o nome do jogo" id="texto">

      <button id="buscar">Buscar</button>
    </section>

    <section class="filters">
  <div class="filter-group">
    <label for="rating">Nota mínima</label>
    <select id="rating">
      <option value="">Todas</option>
      <option value="4">4+</option>
      <option value="3">3+</option>
      <option value="2">2+</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="year">Ano</label>
    <select id="year">
      <option value="">Todos</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2020">2020+</option>
      <option value="2015">2015+</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="order">Ordenar por</label>
    <select id="order">
      <option value="relevance">Relevância</option>
      <option value="rating">Nota</option>
      <option value="released">Lançamento</option>
    </select>
  </div>
</section>

    </section>
    <section class="results" id="results">



    </section>
  </main>

</body>
<script>


  const nome = document.getElementById("texto")

  const API_KEY = "08edfd856b7548e5b049a2e6c0442089"

  const results = document.getElementById("results");

  const botao = document.getElementById("buscar")

  const filtroNota=document.getElementById("rating")
  const filtroAno=document.getElementById("year")

  async function buscarJogos() {
    const termo = nome.value
    const URL = `https://api.rawg.io/api/games?search=${termo}&key=${API_KEY}`

    const response = await fetch(URL)
    if (response.status === 200) {
      const objeto = await response.json();
      console.log(objeto)

      objeto.results.forEach(game => {
        const card = document.createElement("div");
        card.classList.add("card");


        card.innerHTML = `
          <img src="${game.background_image}">
          <h3>${game.name}</h3>
          <p>⭐ <strong>${game.rating}</strong></p>
          <p>📅 ${game.released?.slice(0, 4)}</p>
        `

        results.appendChild(card);
      })


    }

  }
  botao.addEventListener("click", buscarJogos);

  // ⌨️ Enter no input
  nome.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      buscarJogos();
    }
  });



  nome.addEventListener("input", verificarTexto);

  function verificarTexto() {
    if (nome.value === "") {
      results.innerHTML = "";
    }
  }


</script>

</html>
